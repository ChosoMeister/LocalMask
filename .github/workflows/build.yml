name: Build & Release Extension

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating releases

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Extension
        run: npm run build

      - name: Package Extension (ZIP)
        run: |
          cd dist
          zip -r ../localmask-extension.zip ./*

      - name: Upload Artifact (For all pushes)
        uses: actions/upload-artifact@v4
        with:
          name: localmask-extension
          path: localmask-extension.zip
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: localmask-extension.zip
          generate_release_notes: true
